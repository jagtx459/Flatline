<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flatline — Dashboard</title>
  <link rel="stylesheet" href="/assets/style.css">
  <link rel="icon" type="image/png" href="/assets/Logo.png">
  <script>try{var t=localStorage.getItem('flatline.theme');if(t==='dark'||t==='light')document.documentElement.dataset.theme=t;}catch(e){}</script>
</head>
<body>
  <div class="container">
    <header class="site">
      <span class="brand"><img class="logo-light" src="/assets/Logo.png" alt="Flatline logo"><img class="logo-dark" src="/assets/LogoDark.png" alt="Flatline logo">FLATLINE</span>
      <nav>
        <a href="/" class="active">Dashboard</a>
        <a href="/flatline">Flatline</a>
        <a href="/actions">Actions</a>
        <a href="/config">Config</a>
      </nav>
      <div class="header-actions">
        <span class="header-version" id="header-version"></span>
        <a class="icon-link" href="https://github.com/jagtx459/Flatline" target="_blank" rel="noopener noreferrer"
          title="View on GitHub" aria-label="View on GitHub">
          <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd"
              d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.22.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z">
            </path></svg>
        </a>
        <button type="button" class="icon-link" id="header-theme" title="Toggle light / dark mode" aria-label="Toggle light / dark mode"></button>
        <button type="button" class="btn ghost small" id="header-logout" style="display:none">Log out</button>
      </div>
    </header>

    <div id="banners"></div>
    <div id="filters" class="filter-row"></div>
    <div id="endpoints"></div>
    <div id="events" class="card"></div>
  </div>

  <script type="module" src="/scripts/dashboard.js"></script>
</body>
</html>
