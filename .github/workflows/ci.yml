# ─────────────────────────────────────────────────────────────────────────────
# .github/workflows/ci.yml
#
# Runs on every push and pull request: validates the code parses, checks
# dependencies and the filesystem for known vulnerabilities, and runs the
# unit test suite. Kept dependency-free — everything here uses Node's built-in
# tooling plus Trivy.
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: ['**']

permissions:
  contents: read

jobs:
  validate:
    name: Validate & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Syntax-check every tracked JS file (git ls-files skips node_modules).
      - name: Syntax check
        run: |
          git ls-files '*.js' | while read -r f; do
            node --check "$f" || exit 1
          done

      # Fail only on high/critical advisories — lower-severity noise shouldn't
      # block a commit.
      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Run tests
        run: npm test

  trivy:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
